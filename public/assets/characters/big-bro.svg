<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Border hex -->
  <polygon points="32,2 58,17 58,47 32,62 6,47 6,17" fill="#2255ff"/>
  <!-- Body -->
  <polygon points="32,7 53.6,19.5 53.6,44.5 32,57 10.4,44.5 10.4,19.5" fill="#04050f"/>
  <!-- Inner panel -->
  <polygon points="32,11 50,21 50,43 32,53 14,43 14,21" fill="#080a20"/>
  <!-- Top-left highlight -->
  <polygon points="32,12 44,19 40,29 32,22 24,29 20,19" fill="white" opacity="0.03"/>
  <!-- Left eye — less tilt, wider = confident/smug -->
  <g transform="rotate(-10,20,31)">
    <ellipse cx="20" cy="31" rx="7.5" ry="5.5" fill="#88ccff"/>
    <ellipse cx="18" cy="29" rx="2.8" ry="2" fill="white" opacity="0.9"/>
  </g>
  <!-- Right eye -->
  <g transform="rotate(10,44,31)">
    <ellipse cx="44" cy="31" rx="7.5" ry="5.5" fill="#88ccff"/>
    <ellipse cx="46" cy="29" rx="2.8" ry="2" fill="white" opacity="0.9"/>
  </g>
  <!-- Wide grin -->
  <path d="M19,44 Q32,52 45,44" fill="none" stroke="#88ccff" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
</svg>
